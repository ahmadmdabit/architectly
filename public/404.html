<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Architectly</title>
    <script>
      // GH Pages SPA shim: rewrite deep links to index.html with the original path
      // preserved in sessionStorage so the router can restore it on boot.
      (function () {
        var segments = location.pathname.split("/").filter(Boolean);
        var base = segments.length > 0 ? "/" + segments[0] + "/" : "/";
        var rest = location.pathname.slice(base.length) + location.search + location.hash;
        sessionStorage.setItem("arch:redirect", "/" + rest);
        location.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
